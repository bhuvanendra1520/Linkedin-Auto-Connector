[SearchCriteria]
# Degree of connection to target: 1st, 2nd, or 3rd
connection_degree = 2nd

# Job title or keyword to search (e.g. Recruiter, Software Engineer)
keyword = Recruiter

# Location filter (e.g. United States, India, London)
location = United States

# Filter for people actively posting jobs.
# Leave blank for no filter, or use exactly: Any job title
actively_hiring =

# Maximum number of connection requests to send per run
limit = 10

[LinkedIn]
# Your li_at session cookie from LinkedIn (see README for how to get this)
# Refresh this every few weeks as it expires
li_at = YOUR_LI_AT_COOKIE_HERE

[Messages]
# Set to True to attach a note to each connection request (2nd/3rd degree only)
include_note = True

# Note sent with connection requests — must be under 300 characters
# Use {name} for first name, {fullName} for full name
connection_message = Hi {name}, I came across your profile and would love to connect!

# Direct message for 1st-degree connections (leave blank if not needed)
message_letter =
